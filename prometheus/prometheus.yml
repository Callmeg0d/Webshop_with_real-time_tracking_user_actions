global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'diploma-monitor'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'user-service'
    metrics_path: /metrics
    static_configs:
      - targets: ['user_service:8000']
        labels:
          service: 'user-service'

  - job_name: 'product-service'
    metrics_path: /metrics
    static_configs:
      - targets: ['product_service:8000']
        labels:
          service: 'product-service'

  - job_name: 'cart-service'
    metrics_path: /metrics
    static_configs:
      - targets: ['cart_service:8000']
        labels:
          service: 'cart-service'

  - job_name: 'order-service'
    metrics_path: /metrics
    static_configs:
      - targets: ['order_service:8000']
        labels:
          service: 'order-service'

  - job_name: 'review-service'
    metrics_path: /metrics
    static_configs:
      - targets: ['review_service:8000']
        labels:
          service: 'review-service'

  - job_name: 'frontend-service'
    metrics_path: /metrics
    static_configs:
      - targets: ['frontend_service:8000']
        labels:
          service: 'frontend-service'

  - job_name: 'notification-service'
    metrics_path: /metrics
    static_configs:
      - targets: ['notification_service:8000']
        labels:
          service: 'notification-service'

  - job_name: 'analytics-service'
    metrics_path: /metrics
    static_configs:
      - targets: ['analytics_service:8000']
        labels:
          service: 'analytics-service'
